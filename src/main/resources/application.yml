server:
  port: 8080

spring:
  application:
    name: checkout
  datasource:
    url: jdbc:mysql://localhost:3306/checkout?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${USER}
    password: ${PASS}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update        # update | create | create-drop | validate | none
      show-sql: true
      properties:
        hibernate:
          dialect: org.hibernate.dialect.MySQL8Dialect
          format_sql: true

mercadopago:
  access-token: ${MERCADOPAGO_ACCESS_TOKEN:TEST-your-access-token-here}
  notification-url: ${MERCADOPAGO_NOTIFICATION_URL:https://your-domain.com/api/webhooks/checkout}

pix:
  provider: ${PIX_PROVIDER:mercadopago}
  gov:
    mock-enabled: ${PIX_GOV_MOCK_ENABLED:true}
    base-url: ${PIX_GOV_BASE_URL:https://api-pix.example.com}
    receiver-key: ${PIX_GOV_RECEIVER_KEY:your-pix-key}
    default-expiration-seconds: ${PIX_GOV_EXPIRATION_SECONDS:3600}
    bearer-token: ${PIX_GOV_BEARER_TOKEN:}
    oauth-token-url: ${PIX_GOV_OAUTH_TOKEN_URL:}
    client-id: ${PIX_GOV_CLIENT_ID:}
    client-secret: ${PIX_GOV_CLIENT_SECRET:}
    scope: ${PIX_GOV_SCOPE:cob.write cob.read payloadlocation.read}

logging:
  level:
    com.marketplace: DEBUG
    com.mercadopago: DEBUG

security:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-in-production}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
  data-encryption-key: ${DATA_ENCRYPTION_KEY:change-this-encryption-key-in-production}
